{% extends "base.html" %}

{% block title %}Editar Transação{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <h1>Editar Transação</h1>

        <form method="POST" class="transaction-form">
            <div class="form-group">
                <label for="description">Descrição:</label>
                <input 
                    type="text" 
                    id="description" 
                    name="description" 
                    value="{{ transaction.description }}" 
                    required
                >
            </div>

            <div class="form-group">
                <label for="amount">Valor:</label>
                <input 
                    type="number" 
                    id="amount" 
                    name="amount" 
                    step="0.01" 
                    value="{{ transaction.amount }}" 
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="type">Tipo:</label>
                <select id="type" name="type" required>
                    <option value="receita" {% if transaction.type == "receita" %}selected{% endif %}>Receita</option>
                    <option value="despesa" {% if transaction.type == "despesa" %}selected{% endif %}>Despesa</option>
                </select>
            </div>

            <div class="form-group">
                <label for="category">Categoria:</label>
                <select name="category" id="category" required>

                </select>
            </div>

            <div class="form-group">
                <label for="date">Data:</label>
                <input 
                    type="date" 
                    id="date" 
                    name="date" 
                    value="{{ transaction.date }}" 
                    required
                >
            </div>

            <div class="form-actions">
                <button type="submit" class="main-btn">Salvar Alterações</button>
                <a href="{{ url_for('home') }}" class="secondary-btn">Voltar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const categorias = {
    receita: [
        "Selecione uma categoria",
        "Salário",
        "Freelance",
        "Investimentos",
        "Vendas",
        "Outros"
    ],
    despesa: [
        "Selecione uma categoria",
        "Alimentação",
        "Transporte",
        "Moradia",
        "Saúde",
        "Lazer",
        "Educação",
        "Assinaturas",
        "Outros"
    ]
};

const typeSelect = document.getElementById("type");
const categorySelect = document.getElementById("category");

const categoriaAtual = "{{ transaction.category|escape }}";
const tipoAtual = "{{ transaction.type|escape }}";

function atualizarCategorias() {
    const tipo = typeSelect.value;
    const lista = categorias[tipo] || [];

    categorySelect.innerHTML = "";

    lista.forEach(cat => {
        const option = document.createElement("option");
        option.value = cat;
        option.textContent = cat;

        if (cat === categoriaAtual) {
            option.selected = true;
        }

        categorySelect.appendChild(option);
    });
}

document.addEventListener("DOMContentLoaded", () => {
    typeSelect.value = tipoAtual;
    atualizarCategorias();
});

typeSelect.addEventListener("change", atualizarCategorias);
</script>
{% endblock %}
