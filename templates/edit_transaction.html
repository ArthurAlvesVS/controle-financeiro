<!DOCTYPE html>
<html lang="pt_BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Transação</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>Editar Transação</h1>

    <form method="post">
      <label for="description">Descrição:</label>
      <input type="text" id="description" name="description" value="{{ transaction.description }}" required>

      <label for="amount">Valor:</label>
      <input type="number" id="amount" name="amount" step="0.01" value="{{ transaction.amount }}" required>

      <label for="category">Categoria:</label>
      <input type="text" id="category" name="category" value="{{ transaction.category}}" required>

      <label for="type">Tipo:</label>
      <select id="type" name="type" required>
        <option value="receita" {% if transaction == "receita"%}selected{% endif %}>
          Receita
        </option>

        <option value="despesa" {% if transaction == "despesa"%}selected{% endif %}>
          Despesa
        </option>
      </select>

      <label for="date">Date:</label>
      <input type="date" id="date" name="date" value="{{ transaction.date }}" required>

      <button type="submit">Salvar Alterações</button>
    </form>

    <p><a href="{{ url_for('home') }}">Voltar para a página inicial</a></p>
  </div>
  
</body>
</html>
