{% extends "base.html" %}

{% block title %}Nova Transação{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <h1>Adicionar Transação</h1>

        <form method="POST" class="transaction-form">
            <div class="form-group">
                <label for="description">Descrição:</label>
                <input type="text" id="description" name="description" placeholder="Ex: Conta de luz">
            </div>

            <div class="form-group">
                <label for="amount">Valor:</label>
                <input type="number" id="amount" name="amount" step="0.01" placeholder="Digite o valor da transação" required>
            </div>

            <div class="form-group">
                <label for="type">Tipo:</label>
                <select id="type" name="type" required>
                    <option value="">Selecione</option>
                    <option value="receita">Receita</option>
                    <option value="despesa">Despesa</option>
                </select>
            </div>

            <div class="form-group">
                <label for="category">Categoria:</label>
                <select name="category" id="category" required>
                    <option value="">Selecione uma categoria</option>
                </select>
            </div>

            <div class="form-group">
                <label for="date">Data:</label>
                <input type="date" id="date" name="date" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="main-btn">Salvar Transação</button>
                <a href="{{ url_for('home') }}" class="secondary-btn">Voltar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const categorias = {
    receita: [
        "Selecione uma categoria",
        "Salário",
        "Freelance",
        "Investimentos",
        "Vendas",
        "Outros"
    ],
    despesa: [
        "Selecione uma categoria",
        "Alimentação",
        "Transporte",
        "Moradia",
        "Saúde",
        "Lazer",
        "Educação",
        "Assinaturas",
        "Outros"
    ]
};

const typeSelect = document.getElementById("type");
const categorySelect = document.getElementById("category");

function atualizarCategorias() {
    const tipo = typeSelect.value;
    const lista = categorias[tipo] || [];

    categorySelect.innerHTML = "";

    lista.forEach(cat => {
        const option = document.createElement("option");
        option.value = cat;
        option.textContent = cat;
        categorySelect.appendChild(option);
    });
}

document.addEventListener("DOMContentLoaded", atualizarCategorias);
typeSelect.addEventListener("change", atualizarCategorias);
</script>
{% endblock %}
